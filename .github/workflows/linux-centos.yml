name: Linux CentOS

on:
  pull_request:
  push:
  release:
    types: published

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: centos:7

    steps:
    - name: Install dependencies
      run: |
        curl -L -O https://github.com/Kitware/CMake/releases/download/v3.16.4/cmake-3.16.4-Linux-x86_64.sh
        chmod +x cmake-3.16.4-Linux-x86_64.sh
        ./cmake-3.16.4-Linux-x86_64.sh --skip-license --prefix=/usr/local
        curl -L -O https://www.mirrorservice.org/sites/dl.fedoraproject.org/pub/epel/7/x86_64/Packages/p/p7zip-16.02-10.el7.x86_64.rpm
        curl -L -O https://www.mirrorservice.org/sites/dl.fedoraproject.org/pub/epel/7/x86_64/Packages/p/p7zip-plugins-16.02-10.el7.x86_64.rpm
        rpm -U --quiet p7zip-16.02-10.el7.x86_64.rpm
        rpm -U --quiet p7zip-plugins-16.02-10.el7.x86_64.rpm
        yum -y install centos-release-scl epel-release
        yum -y install wget libXt-devel libXext-devel ninja-build make \
          devtoolset-7-gcc* numactl-devel openmpi3-devel freeglut-devel
        yum install -y @development zlib-devel bzip2 bzip2-devel readline-devel sqlite \
          sqlite-devel openssl-devel xz xz-devel libffi-devel findutils
        curl https://pyenv.run | bash
        export PATH="$HOME/.pyenv/bin:$PATH"
        eval "$(pyenv init -)"
        PYTHON_CONFIGURE_OPTS="--enable-shared" pyenv install 3.6.9
        pyenv shell 3.6.9
        yum remove git*
        yum remove perl-Git*
        yum -y install https://centos7.iuscommunity.org/ius-release.rpm
        yum install -y git222-all
        git --version

    - name: Checkout BioDynaMo
      uses: actions/checkout@v2

    - name: Get BioDynaMo git version history
      shell: bash
      run: |
        git fetch --unshallow
        git fetch --tags origin
        git remote set-branches --add origin master

    - name: Build BioDynaMo
      shell: bash
      run: |
        cmake -G Ninja -Dopencl=OFF -Dparaview=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -B build
        cmake --build build --parallel --config Release

    - name: Test BioDynaMo
      shell: bash
      run: |
        . bin/thisbdm.sh
        bin/biodynamo-unit-tests
      working-directory: build

    - name: Create BioDynaMo archive
      if: github.event.action == 'published'
      shell: bash
      run: |
        mkdir artifact
        7z a artifact/biodynamo-mac.zip ./build

    - name: Upload BioDynaMo archive
      if: github.event.action == 'published'
      uses: actions/upload-artifact@v1
      with:
        name: biodynamo-binary-archives
        path: artifact

    - name: Upload release asset
      if: github.event.action == 'published'
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./artifact/biodynamo-mac.zip
        asset_name: biodynamo-mac.zip
        asset_content_type: application/zip
